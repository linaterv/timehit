{% extends "base.html" %}

{% block title %}Upload Contract — TimeHit{% endblock %}

{% block content %}
<h1 class="mb-4">Upload Contract</h1>

{% if errors %}
<div class="alert alert-danger">
    {% for error in errors %}<p class="mb-0">{{ error }}</p>{% endfor %}
</div>
{% endif %}

<form method="post" action="{% url 'contract-create' %}" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="row mb-3">
        <div class="col-md-6">
            <label for="title" class="form-label">Title *</label>
            <input type="text" name="title" id="title" class="form-control" required
                   value="{{ form_data.title|default:'' }}">
        </div>
        <div class="col-md-3">
            <label for="contract_type" class="form-label">Type</label>
            <select name="contract_type" id="contract_type" class="form-select">
                {% for val, label in contract_types %}
                <option value="{{ val }}" {% if form_data.contract_type == val %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-3">
            <label for="status" class="form-label">Status</label>
            <select name="status" id="status" class="form-select">
                {% for val, label in contract_statuses %}
                <option value="{{ val }}" {% if form_data.status == val %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="row mb-3">
        <div class="col-md-4">
            <label for="contractor" class="form-label">Contractor</label>
            <select name="contractor" id="contractor" class="form-select">
                <option value="">— None —</option>
                {% for ct in contractors %}
                <option value="{{ ct.pk }}" {% if form_data.contractor == ct.pk|slugify %}selected{% endif %}>{{ ct.user.get_full_name }} ({{ ct.user.email }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label for="client" class="form-label">Client</label>
            <select name="client" id="client" class="form-select">
                <option value="">— None —</option>
                {% for c in clients %}
                <option value="{{ c.pk }}" {% if form_data.client == c.pk|slugify %}selected{% endif %}>{{ c.company_name }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="row mb-3">
        <div class="col-md-4">
            <label for="signed_date" class="form-label">Signed Date *</label>
            <input type="date" name="signed_date" id="signed_date" class="form-control" required
                   value="{{ form_data.signed_date|default:'' }}">
        </div>
        <div class="col-md-4">
            <label for="expiry_date" class="form-label">Expiry Date</label>
            <input type="date" name="expiry_date" id="expiry_date" class="form-control"
                   value="{{ form_data.expiry_date|default:'' }}">
        </div>
    </div>

    <div class="mb-3">
        <label for="document" class="form-label">Document * (PDF, JPG, PNG — max 10 MB)</label>
        <input type="file" name="document" id="document" class="form-control" required
               accept=".pdf,.jpg,.jpeg,.png">
    </div>

    <div class="mb-3">
        <label for="notes" class="form-label">Internal Notes</label>
        <textarea name="notes" id="notes" class="form-control" rows="3">{{ form_data.notes|default:'' }}</textarea>
    </div>

    <div class="mt-3">
        <button type="submit" class="btn btn-primary">Upload Contract</button>
        <a href="{% url 'contract-list' %}" class="btn btn-secondary ms-2">Cancel</a>
    </div>
</form>
{% endblock %}
