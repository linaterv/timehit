{% extends "base.html" %}

{% block title %}Edit Contractor — TimeHit{% endblock %}

{% block content %}
<h1 class="mb-4">Edit Contractor: {{ contractor.user.email }}</h1>

<div id="form-container">
    {% include "contractors/_partial_contractor_edit_form.html" %}
</div>

<hr>
<h5>Actions</h5>
<div class="d-flex gap-2">
    {% if contractor.user.is_active %}
    <form method="post" action="{% url 'contractor-deactivate' contractor.pk %}"
          onsubmit="return confirm('Deactivate this contractor?');">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger btn-sm">Deactivate</button>
    </form>
    {% endif %}
</div>
{% endblock %}
