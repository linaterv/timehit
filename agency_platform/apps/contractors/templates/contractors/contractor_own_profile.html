{% extends "base.html" %}

{% block title %}My Profile — TimeHit{% endblock %}

{% block content %}
<h1 class="mb-4">My Profile</h1>

{% if errors %}
<div class="alert alert-danger">
    {% for error in errors %}<p class="mb-0">{{ error }}</p>{% endfor %}
</div>
{% endif %}

<form method="post">
    {% csrf_token %}
    <h5 class="mb-3">Personal Info</h5>
    <div class="row mb-3">
        <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" value="{{ contractor.user.email }}" disabled>
        </div>
    </div>
    <div class="row mb-3">
        <div class="col-md-6">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" value="{{ contractor.user.first_name }}" disabled>
        </div>
        <div class="col-md-6">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" value="{{ contractor.user.last_name }}" disabled>
        </div>
    </div>
    <div class="row mb-3">
        <div class="col-md-6">
            <label for="phone" class="form-label">Phone</label>
            <input type="text" name="phone" id="phone" class="form-control"
                   value="{{ contractor.user.phone }}">
        </div>
    </div>

    <hr>
    <h5 class="mb-3">Bank Details</h5>
    <div class="row mb-3">
        <div class="col-md-6">
            <label for="bank_name" class="form-label">Bank Name</label>
            <input type="text" name="bank_name" id="bank_name" class="form-control"
                   value="{{ contractor.bank_name }}">
        </div>
        <div class="col-md-6">
            <label for="bank_account" class="form-label">Bank Account</label>
            <input type="text" name="bank_account" id="bank_account" class="form-control"
                   value="{{ contractor.bank_account }}">
        </div>
    </div>

    <div class="mb-3">
        <label for="address" class="form-label">Address</label>
        <textarea name="address" id="address" class="form-control" rows="2">{{ contractor.address }}</textarea>
    </div>

    <div class="row mb-3">
        <div class="col-md-6">
            <label class="form-label">Company</label>
            <input type="text" class="form-control" value="{{ contractor.company_name }}" disabled>
        </div>
        <div class="col-md-6">
            <label class="form-label">Tax ID</label>
            <input type="text" class="form-control" value="{{ contractor.tax_id }}" disabled>
        </div>
    </div>

    <div class="mt-3">
        <button type="submit" class="btn btn-primary">Save Changes</button>
    </div>
</form>
{% endblock %}
