{% extends "base.html" %}

{% block title %}Contractors — TimeHit{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Contractors</h1>
    <a href="{% url 'contractor-create' %}" class="btn btn-primary">Create Contractor</a>
</div>

<div class="row mb-3">
    <div class="col-md-6">
        <input type="text" class="form-control" placeholder="Search by name, email, or company..."
               name="search" value="{{ search }}"
               hx-get="{% url 'contractor-list' %}"
               hx-target="#contractor-table-body"
               hx-trigger="keyup changed delay:300ms">
    </div>
</div>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Company</th>
            <th>Active</th>
            <th>Created</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="contractor-table-body">
        {% include "contractors/_partial_contractor_list.html" %}
    </tbody>
</table>
{% endblock %}
