{% for c in contractors %}
<tr>
    <td>{{ c.user.get_full_name }}</td>
    <td>{{ c.user.email }}</td>
    <td>{{ c.company_name|default:"—" }}</td>
    <td>
        {% if c.user.is_active %}
        <span class="badge bg-success">Active</span>
        {% else %}
        <span class="badge bg-danger">Inactive</span>
        {% endif %}
    </td>
    <td>{{ c.created_at|date:"Y-m-d" }}</td>
    <td>
        <a href="{% url 'contractor-edit' c.pk %}" class="btn btn-sm btn-outline-primary">Edit</a>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="6" class="text-muted text-center">No contractors found.</td>
</tr>
{% endfor %}
