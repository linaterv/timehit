{% for u in users %}
<tr>
    <td>{{ u.get_full_name }}</td>
    <td>{{ u.email }}</td>
    <td><span class="badge bg-{% if u.role == 'admin' %}primary{% else %}secondary{% endif %}">{{ u.get_role_display }}</span></td>
    <td>
        {% if u.is_active %}
        <span class="badge bg-success">Active</span>
        {% else %}
        <span class="badge bg-danger">Inactive</span>
        {% endif %}
    </td>
    <td>{{ u.created_at|date:"Y-m-d" }}</td>
    <td>
        <a href="{% url 'user-edit' u.pk %}" class="btn btn-sm btn-outline-primary">Edit</a>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="6" class="text-muted text-center">No users found.</td>
</tr>
{% endfor %}
