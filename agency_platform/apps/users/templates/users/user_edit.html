{% extends "base.html" %}

{% block title %}Edit User — TimeHit{% endblock %}

{% block content %}
<h1 class="mb-4">Edit User: {{ edit_user.email }}</h1>

<div id="form-container">
    {% include "users/_partial_user_edit_form.html" %}
</div>

<hr>
<h5>Actions</h5>
<div class="d-flex gap-2">
    {% if edit_user.is_active %}
    <form method="post" action="{% url 'user-deactivate' edit_user.pk %}"
          onsubmit="return confirm('Deactivate this user?');">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger btn-sm">Deactivate</button>
    </form>
    {% endif %}
    <form method="post" action="{% url 'user-reset-password' edit_user.pk %}"
          onsubmit="return confirm('Reset password for this user?');">
        {% csrf_token %}
        <button type="submit" class="btn btn-warning btn-sm">Reset Password</button>
    </form>
</div>
{% endblock %}
