{% if errors %}
<div class="alert alert-danger">
    {% for error in errors %}<p class="mb-0">{{ error }}</p>{% endfor %}
</div>
{% endif %}

<form method="post" action="{% url 'user-edit' edit_user.pk %}">
    {% csrf_token %}
    <div class="row mb-3">
        <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" value="{{ edit_user.email }}" disabled>
        </div>
    </div>
    <div class="row mb-3">
        <div class="col-md-6">
            <label for="first_name" class="form-label">First Name *</label>
            <input type="text" name="first_name" id="first_name" class="form-control" required
                   value="{{ edit_user.first_name }}">
        </div>
        <div class="col-md-6">
            <label for="last_name" class="form-label">Last Name *</label>
            <input type="text" name="last_name" id="last_name" class="form-control" required
                   value="{{ edit_user.last_name }}">
        </div>
    </div>
    <div class="row mb-3">
        <div class="col-md-6">
            <label for="role" class="form-label">Role *</label>
            <select name="role" id="role" class="form-select" {% if is_self %}disabled{% endif %}>
                <option value="admin" {% if edit_user.role == 'admin' %}selected{% endif %}>Admin</option>
                <option value="clerk" {% if edit_user.role == 'clerk' %}selected{% endif %}>Clerk</option>
            </select>
            {% if is_self %}<small class="text-muted">You cannot change your own role.</small>{% endif %}
        </div>
        <div class="col-md-6">
            <label for="phone" class="form-label">Phone</label>
            <input type="text" name="phone" id="phone" class="form-control"
                   value="{{ edit_user.phone }}">
        </div>
    </div>
    <div class="mb-3 form-check">
        <input type="checkbox" name="is_active" id="is_active" class="form-check-input"
               {% if edit_user.is_active %}checked{% endif %}>
        <label for="is_active" class="form-check-label">Active</label>
    </div>
    <div class="mt-3">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{% url 'user-list' %}" class="btn btn-secondary ms-2">Cancel</a>
    </div>
</form>
