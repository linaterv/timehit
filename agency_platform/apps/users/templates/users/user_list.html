{% extends "base.html" %}

{% block title %}Users — TimeHit{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Agency Users</h1>
    <a href="{% url 'user-create' %}" class="btn btn-primary">Create User</a>
</div>

<div class="row mb-3">
    <div class="col-md-6">
        <input type="text" class="form-control" placeholder="Search by name or email..."
               name="search" value="{{ search }}"
               hx-get="{% url 'user-list' %}"
               hx-target="#user-table-body"
               hx-trigger="keyup changed delay:300ms"
               hx-include="[name='role']">
    </div>
    <div class="col-md-3">
        <select name="role" class="form-select"
                hx-get="{% url 'user-list' %}"
                hx-target="#user-table-body"
                hx-trigger="change"
                hx-include="[name='search']">
            <option value="">All roles</option>
            <option value="admin" {% if current_role == 'admin' %}selected{% endif %}>Admin</option>
            <option value="clerk" {% if current_role == 'clerk' %}selected{% endif %}>Clerk</option>
        </select>
    </div>
</div>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Active</th>
            <th>Created</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="user-table-body">
        {% include "users/_partial_user_list.html" %}
    </tbody>
</table>
{% endblock %}
