{% extends "base.html" %}

{% block title %}Create Client — TimeHit{% endblock %}

{% block content %}
<h1 class="mb-4">Create Client</h1>

{% if errors %}
<div class="alert alert-danger">
    <ul class="mb-0">
        {% for error in errors %}
        <li>{{ error }}</li>
        {% endfor %}
    </ul>
</div>
{% endif %}

<form method="post" action="{% url 'client-create' %}">
    {% csrf_token %}
    {% include "clients/_partial_client_form.html" %}
</form>
{% endblock %}
