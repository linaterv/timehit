<table class="table table-striped">
    <thead>
        <tr>
            <th>Company Name</th>
            <th>Contact Name</th>
            <th>Status</th>
            <th>Active Placements</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for client in clients %}
        <tr>
            <td>{{ client.company_name }}</td>
            <td>{{ client.contact_name|default:"—" }}</td>
            <td>
                {% if client.is_active %}
                <span class="badge bg-success">Active</span>
                {% else %}
                <span class="badge bg-secondary">Inactive</span>
                {% endif %}
            </td>
            <td>0</td>
            <td>
                <a href="{% url 'client-edit' client.pk %}" class="btn btn-sm btn-outline-primary">Edit</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5" class="text-muted text-center">No clients found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
