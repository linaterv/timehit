{% if errors %}
<div class="alert alert-danger">
    <ul class="mb-0">
        {% for error in errors %}
        <li>{{ error }}</li>
        {% endfor %}
    </ul>
</div>
{% endif %}

<div class="row">
    <div class="col-md-6">
        <div class="mb-3">
            <label for="company_name" class="form-label">Company Name <span class="text-danger">*</span></label>
            <input type="text" name="company_name" id="company_name" class="form-control"
                   value="{{ client.company_name }}" required>
        </div>
        <div class="mb-3">
            <label for="billing_address" class="form-label">Billing Address <span class="text-danger">*</span></label>
            <textarea name="billing_address" id="billing_address" class="form-control" rows="3"
                      required>{{ client.billing_address }}</textarea>
        </div>
        <div class="mb-3">
            <label for="tax_id" class="form-label">Tax / VAT ID</label>
            <input type="text" name="tax_id" id="tax_id" class="form-control"
                   value="{{ client.tax_id }}">
        </div>
        <div class="mb-3">
            <label for="payment_terms" class="form-label">Payment Terms (days)</label>
            <input type="number" name="payment_terms" id="payment_terms" class="form-control"
                   value="{{ client.payment_terms }}" min="0">
        </div>
    </div>
    <div class="col-md-6">
        <div class="mb-3">
            <label for="contact_name" class="form-label">Contact Name</label>
            <input type="text" name="contact_name" id="contact_name" class="form-control"
                   value="{{ client.contact_name }}">
        </div>
        <div class="mb-3">
            <label for="contact_email" class="form-label">Contact Email</label>
            <input type="email" name="contact_email" id="contact_email" class="form-control"
                   value="{{ client.contact_email }}">
        </div>
        <div class="mb-3">
            <label for="contact_phone" class="form-label">Contact Phone</label>
            <input type="text" name="contact_phone" id="contact_phone" class="form-control"
                   value="{{ client.contact_phone }}">
        </div>
        <div class="mb-3">
            <label for="notes" class="form-label">Notes</label>
            <textarea name="notes" id="notes" class="form-control" rows="3">{{ client.notes }}</textarea>
        </div>
    </div>
</div>

<div class="mb-3">
    <div class="form-check">
        <input type="checkbox" name="is_active" id="is_active" class="form-check-input"
               {% if client.is_active %}checked{% endif %}>
        <label for="is_active" class="form-check-label">Active</label>
    </div>
    {% if client.is_active %}
    <div class="form-text text-warning">
        <small>⚠️ If this client has active placements, deactivating will not auto-close them. Review placements first.</small>
    </div>
    {% endif %}
</div>

<div class="mt-3">
    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="{% url 'client-list' %}" class="btn btn-secondary ms-2">Cancel</a>
    {% if client.is_active %}
    <form method="post" action="{% url 'client-deactivate' client.pk %}" class="d-inline ms-2"
          onsubmit="return confirm('Are you sure you want to deactivate this client?')">
        {% csrf_token %}
        <button type="submit" class="btn btn-outline-danger">Deactivate</button>
    </form>
    {% endif %}
</div>
