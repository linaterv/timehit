{% if errors %}
<div class="alert alert-danger">
    <ul class="mb-0">
        {% for error in errors %}
        <li>{{ error }}</li>
        {% endfor %}
    </ul>
</div>
{% endif %}

<div class="row">
    <div class="col-md-6">
        <div class="mb-3">
            <label for="company_name" class="form-label">Company Name <span class="text-danger">*</span></label>
            <input type="text" name="company_name" id="company_name" class="form-control"
                   value="{{ form_data.company_name|default:'' }}" required>
        </div>
        <div class="mb-3">
            <label for="billing_address" class="form-label">Billing Address <span class="text-danger">*</span></label>
            <textarea name="billing_address" id="billing_address" class="form-control" rows="3"
                      required>{{ form_data.billing_address|default:'' }}</textarea>
        </div>
        <div class="mb-3">
            <label for="tax_id" class="form-label">Tax / VAT ID</label>
            <input type="text" name="tax_id" id="tax_id" class="form-control"
                   value="{{ form_data.tax_id|default:'' }}">
        </div>
        <div class="mb-3">
            <label for="payment_terms" class="form-label">Payment Terms (days)</label>
            <input type="number" name="payment_terms" id="payment_terms" class="form-control"
                   value="{{ form_data.payment_terms|default:'30' }}" min="0">
        </div>
    </div>
    <div class="col-md-6">
        <div class="mb-3">
            <label for="contact_name" class="form-label">Contact Name</label>
            <input type="text" name="contact_name" id="contact_name" class="form-control"
                   value="{{ form_data.contact_name|default:'' }}">
        </div>
        <div class="mb-3">
            <label for="contact_email" class="form-label">Contact Email</label>
            <input type="email" name="contact_email" id="contact_email" class="form-control"
                   value="{{ form_data.contact_email|default:'' }}">
        </div>
        <div class="mb-3">
            <label for="contact_phone" class="form-label">Contact Phone</label>
            <input type="text" name="contact_phone" id="contact_phone" class="form-control"
                   value="{{ form_data.contact_phone|default:'' }}">
        </div>
        <div class="mb-3">
            <label for="notes" class="form-label">Notes</label>
            <textarea name="notes" id="notes" class="form-control" rows="3">{{ form_data.notes|default:'' }}</textarea>
        </div>
    </div>
</div>

<div class="mt-3">
    <button type="submit" class="btn btn-primary">Create Client</button>
    <a href="{% url 'client-list' %}" class="btn btn-secondary ms-2">Cancel</a>
</div>
